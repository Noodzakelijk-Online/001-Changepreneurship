[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show locals on failure, short tracebacks by default
addopts =
    --tb=short
    --no-header
    -q

# Treat warnings as errors only for our own code
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
