services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: changepreneurship-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-changepreneurship}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5432:5432"  # localhost only — access via SSH tunnel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d changepreneurship"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - changepreneurship-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: changepreneurship-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    # No port exposure — internal network only
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - changepreneurship-network

  # Flask Backend
  backend:
    build:
      context: ./changepreneurship-backend
      dockerfile: Dockerfile
      target: base
    container_name: changepreneurship-backend
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-changepreneurship}
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      
      # Flask
      FLASK_APP: src.main:app
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      
      # LLM Settings
      USE_LLM: "true"
      LLM_CONSENSUS: "true"
      LLM_PROVIDER: "groq"
      LLM_MODEL: "llama-3.3-70b-versatile"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://changepreneurship.duckdns.org}
    ports:
      - "127.0.0.1:5000:5000"  # localhost only — Caddy proxies internally
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    networks:
      - changepreneurship-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # React Frontend
  frontend:
    build:
      context: ./changepreneurship-enhanced
      dockerfile: Dockerfile
    container_name: changepreneurship-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - changepreneurship-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Caddy — reverse proxy + automatic SSL (Let's Encrypt)
  caddy:
    image: caddy:2-alpine
    container_name: changepreneurship-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_ADMIN_HASH: ${CADDY_ADMIN_HASH}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - changepreneurship-network

  # RedisInsight — Redis GUI (internal only, exposed through Caddy with basic auth)
  redisinsight:
    image: redis/redisinsight:latest
    container_name: changepreneurship-redisinsight
    restart: unless-stopped
    volumes:
      - redisinsight_data:/data
    # No direct port exposure — Caddy proxies /redis-ui/ with basic auth
    networks:
      - changepreneurship-network

networks:
  changepreneurship-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_logs:
  caddy_data:
  caddy_config:
  redisinsight_data:
