name: MVP Infrastructure Checks

on:
  pull_request:
    paths:
      - 'changepreneurship-backend/**'
      - 'changepreneurship-enhanced/**'
      - '.github/workflows/mvp-infra-checks.yml'
  workflow_dispatch:

jobs:
  backend-import-check:
    name: Backend import check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: changepreneurship-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import Flask app and MVP modules
        env:
          FLASK_ENV: development
          SECRET_KEY: ci-test-secret
          DATABASE_URL: sqlite:////tmp/changepreneurship-ci.db
        run: |
          python - <<'PY'
          import importlib
          modules = [
              'src.main',
              'src.models.mvp_infrastructure',
              'src.models.mvp_logic',
              'src.routes.mvp_infrastructure',
              'src.routes.mvp_logic',
              'src.routes.mentor_sources',
              'src.services.action_engine',
              'src.services.assessment_to_mvp_adapter',
              'src.services.mentor_source_router',
              'src.services.mvp_policies',
              'src.services.path_decision_engine',
          ]
          for module in modules:
              importlib.import_module(module)
              print(f'OK import {module}')
          PY

  frontend-build-check:
    name: Frontend build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: changepreneurship-enhanced
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: changepreneurship-enhanced/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build
